//www.youtube.com/watch?v=jIo2tVA9FBU","cue":"Right side first. Slow, controlled. Feel glute med fire — not TFL. Keep feet together, hips stacked.","category":"activation","cueCn":"右侧先做。缓慢、有控制地打开。感受臀中肌发力——不是阔筋膜张肌。双脚并拢，髋部叠放。"},"single-leg-glute-bridge":{"name":"Single-Leg Glute Bridge","nameCn":"单腿臀桥","video":"https://www.youtube.com/watch?v=_K_di6h2-Wg","cue":"Right side first. Drive through heel. Hold top 1–2s. Squeeze glute hard at lockout. Don't hyperextend lower back.","category":"activation","cueCn":"右侧先做。通过脚跟发力。在顶部保持1-2秒。用力挤压臀肌。不要过度伸展下背部。"},"cat-cow":{"name":"Cat-Cow","nameCn":"猫牛式","video":"https://www.youtube.com/watch?v=vuyUwtHl694","cue":"Sync with breath — inhale cow (extend), exhale cat (flex). Full spinal segmentation. Move slowly through each vertebra.","category":"mobility","cueCn":"配合呼吸——吸气做牛式（伸展），呼气做猫式（屈曲）。完整的脊柱分节运动。缓慢地通过每个椎骨。"},"band-pull-apart":{"name":"Band Pull-Apart","nameCn":"弹力带拉开","video":"https://www.youtube.com/watch?v=smSSXITNpCI","cue":"Shoulder-width grip. Squeeze shoulder blades together at end range. Control return. Retract and depress scapulae.","category":"activation","cueCn":"与肩同宽握住弹力带。在末端挤压肩胛骨。控制回程。肩胛骨后缩并下沉。"},"banded-monster-walk":{"name":"Banded Monster Walk","nameCn":"弹力带怪兽步","video":"https://www.youtube.com/watch?v=hE4UsbLMjC8","cue":"Band above knees. Stay low in quarter squat. Step forward and out at 45°. Maintain tension on band throughout.","category":"activation","cueCn":"弹力带放在膝盖上方。保持四分之一蹲位。以45°角向前向外迈步。全程保持弹力带张力。"},"bodyweight-squat":{"name":"Bodyweight Squat","nameCn":"徒手深蹲","video":"https://www.youtube.com/watch?v=8Kls95w2jFA","cue":"Sit back and down. Knees track toes. Full depth — below parallel if mobility allows. Heels stay down, chest up.","category":"squat","cueCn":"向后向下坐。膝盖对准脚尖方向。全深度——如果灵活性允许，蹲到平行以下。脚跟不离地，胸部挺起。"},"single-leg-balance":{"name":"Single-Leg Balance","nameCn":"单腿站立平衡","video":"https://www.youtube.com/watch?v=JFRKuQmqTIU","cue":"Right foot first. Maintain foot tripod contact. Stand tall, engage core. Progress: eyes open → eyes closed.","category":"activation","cueCn":"右脚先做。保持足底三点接触地面。站直，收紧核心。进阶：睁眼→闭眼。"},"hip-circles":{"name":"Hip Circles (Quadruped)","nameCn":"四点支撑髋画圈","video":"https://www.youtube.com/watch?v=iLopAskDMqk","cue":"On all fours. Controlled circles — lift knee out to side, rotate forward/back. Open up the hip joint.","category":"mobility","cueCn":"四点支撑姿势。有控制地画圈——将膝盖向侧面抬起，向前/向后旋转。打开髋关节。"},"band-straight-arm-pulldown":{"name":"Band Straight-Arm Pulldown","nameCn":"弹力带直臂下拉","video":"https://www.youtube.com/watch?v=K4VAFznrNLk","cue":"Anchor band high (rack or stall bar). Arms straight, pull down to thighs. FEEL THE LATS — this is the key activation drill. Slow eccentric. Pull from lats, not arms.","category":"activation","cueCn":"将弹力带固定在高处（架子或肋木）。手臂伸直，向下拉至大腿。感受背阔肌发力——这是关键的激活训练。缓慢离心。用背阔肌拉，不是手臂。"},"scapular-pullup":{"name":"Scapular Pull-Up","nameCn":"肩胛引体","video":"https://www.youtube.com/watch?v=-ZIpSoTRsuE","cue":"Hang with straight arms from bar or rings. Pull shoulder blades DOWN and TOGETHER. No elbow bend. This teaches scapular depression — the foundation for all pulling.","category":"activation","cueCn":"双臂伸直悬挂在杠或吊环上。将肩胛骨向下并拢。不要弯曲肘部。这个动作教你肩胛骨下沉——所有拉力动作的基础。"},"thoracic-rotation":{"name":"Thoracic Rotation (Side-Lying)","nameCn":"侧卧胸椎旋转","video":"https://www.youtube.com/watch?v=uMWob72Y-EY","cue":"Lie on side, knees stacked at 90°. Open top arm to ceiling, rotating through thoracic spine. Follow hand with eyes. Keep hips stacked.","category":"mobility","cueCn":"侧卧，膝盖叠放在90°。上方手臂向天花板打开，通过胸椎旋转。眼睛跟随手移动。保持髋部叠放不动。"},"pushup":{"name":"Push-Up","nameCn":"俯卧撑","video":"https://www.youtube.com/watch?v=IODxDxX7oi4","cue":"Full range of motion. Elbows at ~45° — not flared. Brace core. Scale from knees if needed, progress to full from toes.","category":"push","cueCn":"全范围动作。肘部约45°——不要外展。收紧核心。如需降低难度可从膝盖开始，逐步进阶到全俯卧撑。"},"arm-circles":{"name":"Arm Circles","nameCn":"手臂画圈","video":"https://www.youtube.com/watch?v=mwDgFY86zck","cue":"Gradually increase range. Forward then backward. Warm up shoulder joint.","category":"mobility","cueCn":"逐渐增大幅度。先向前再向后。热身肩关节。"},"banded-glute-bridge":{"name":"Banded Glute Bridge","nameCn":"弹力带臀桥","video":"https://www.youtube.com/watch?v=GaxOodE1Irk","cue":"Band above knees. Push knees out against band throughout. Squeeze glutes hard at top. Hold 1s.","category":"activation","cueCn":"弹力带放在膝盖上方。全程向外推膝盖对抗弹力带。在顶部用力挤压臀肌。保持1秒。"},"barbell-rdl":{"name":"Barbell RDL","nameCn":"杠铃罗马尼亚硬拉","video":"https://www.youtube.com/watch?v=ZEnWV4kguKc","cue":"Soft knees. Push hips BACK, not down. Bar traces thighs. Feel hamstrings stretch. Brace before each rep. Neutral spine throughout.","category":"hinge","cueCn":"膝盖微屈。将髋部向后推，不是向下。杠铃贴着大腿移动。感受腘绳肌拉伸。每次动作前收紧核心。全程保持脊柱中立。"},"barbell-hip-thrust":{"name":"Barbell Hip Thrust","nameCn":"杠铃臀推","video":"https://www.youtube.com/watch?v=hCm-70-9_XE","cue":"Shoulder blades on bench edge. Feet flat, shins vertical at top. Drive through heels. Full lockout — squeeze glutes 1s at top. Posterior pelvic tilt at top.","category":"glute","cueCn":"肩胛骨靠在长凳边缘。双脚平放，顶部时小腿垂直。通过脚跟发力。完全锁定——在顶部挤压臀肌1秒。骨盆后倾。"},"single-leg-rdl":{"name":"Single-Leg RDL (Dumbbell)","nameCn":"单腿罗马尼亚硬拉","video":"https://www.youtube.com/watch?v=iS7atZhcRnw","cue":"Right side first. Hinge at hip, not lower back. Trail leg extends behind as counterbalance. Keep hips square.","category":"hinge","cueCn":"右侧先做。在髋关节处铰链，不是下背部。后腿向后伸展作为平衡。保持髋部正对前方。"},"hyper-pro-back-ext":{"name":"Hyper Pro Back Extension (Glute-Focused)","nameCn":"罗马椅背伸展（臀部发力）","video":"https://www.youtube.com/watch?v=sRP1Q1L8pj4","cue":"Round upper back slightly to bias glutes over erectors. Squeeze glutes to drive extension. Slow eccentric.","category":"glute","cueCn":"上背部略微弯曲以偏向臀肌而非竖脊肌。挤压臀肌驱动伸展。缓慢离心。"},"banded-lateral-walk":{"name":"Banded Lateral Walk","nameCn":"弹力带侧步走","video":"https://www.youtube.com/watch?v=x8DFUsLq8t8","cue":"Band above knees. Stay low in quarter squat. Push knees out against band. Don't let feet come together. Maintain constant tension.","category":"glute","cueCn":"弹力带放在膝盖上方。保持四分之一蹲位。向外推膝盖对抗弹力带。双脚不要靠拢。保持持续张力。"},"pallof-press":{"name":"Pallof Press","nameCn":"帕洛夫推","video":"https://www.youtube.com/watch?v=Y0e2w0aKOXw","cue":"Anchor band at chest height. Press out and hold 2s. Resist rotation — core fights the pull. Brace, don't lean.","category":"core","cueCn":"将弹力带固定在胸部高度。向前推出并保持2秒。抵抗旋转——核心对抗拉力。收紧核心，不要倾斜。"},"dead-bug":{"name":"Dead Bug","nameCn":"死虫式","video":"https://www.youtube.com/watch?v=g5XKMzr5gUs","cue":"Press lower back into floor throughout. Opposite arm + leg extend. Exhale as limbs extend. Slow and controlled.","category":"core","cueCn":"全程将下背部压入地面。对侧手臂和腿伸展。呼气时伸展四肢。缓慢有控制。"},"chest-supported-db-row":{"name":"Chest-Supported DB Row","nameCn":"俯身哑铃划船（胸部支撑）","video":"https://www.youtube.com/watch?v=H75im9fAUMc","cue":"Bench at 30° incline. Chest on bench eliminates momentum. Pull elbows to HIPS, not shoulders — this targets lats over traps. Squeeze shoulder blades at top.","category":"pull","cueCn":"长凳倾斜30°。胸部贴在凳上消除惯性。将肘部拉向髋部，不是肩部——这样目标是背阔肌而非斜方肌。在顶部挤压肩胛骨。"},"ring-inverted-row":{"name":"Ring Inverted Row","nameCn":"吊环反向划船","video":"https://www.youtube.com/watch?v=jdOXFr-4m4g","cue":"Initiate pull by depressing shoulder blades FIRST, then row. Chest to rings. Adjust body angle for difficulty — more horizontal = harder.","category":"pull","cueCn":"先下沉肩胛骨，再划船。胸部触碰吊环。调整身体角度控制难度——越水平越难。"},"prone-y-raise":{"name":"Prone Y-Raise","nameCn":"俯卧Y字上举","video":"https://www.youtube.com/watch?v=pgGtV-2RlUw","cue":"Lie face down on bench. Arms in Y position. Thumbs up. Lift with lower traps and rear delts. Very light weight — this is about activation, not load.","category":"pull","cueCn":"俯卧在长凳上。手臂呈Y字形。拇指朝上。用下斜方肌和三角肌后束上抬。非常轻的重量——重在激活，不在负荷。"},"db-bicep-curl":{"name":"DB Bicep Curl","nameCn":"哑铃弯举","video":"https://www.youtube.com/watch?v=in7PaeYlhrM","cue":"Controlled. No swing. Supinate at top. Full range of motion.","category":"pull","cueCn":"有控制。不要摆动。在顶部旋前。全范围动作。"},"band-face-pull":{"name":"Band Face Pull","nameCn":"弹力带面拉","video":"https://www.youtube.com/watch?v=ljgqer1ZpXg","cue":"Pull to face level. Elbows high. External rotate at end range. Rear delt + rotator cuff health.","category":"pull","cueCn":"拉到面部高度。肘部抬高。在末端外旋。三角肌后束+肩袖健康。"},"plank":{"name":"Plank","nameCn":"平板支撑","video":"https://www.youtube.com/watch?v=A2b2EmIg0dA","cue":"Squeeze glutes. Brace core. Don't let hips sag or pike. Straight line from head to heels.","category":"core","cueCn":"挤压臀肌。收紧核心。不要让髋部下沉或抬起。从头到脚跟保持一条直线。"},"side-plank":{"name":"Side Plank","nameCn":"侧平板支撑","video":"https://www.youtube.com/watch?v=cSIWldRoKTo","cue":"Stack or stagger feet. Hips up — don't let them drop. Right side first. Engage obliques and glute med.","category":"core","cueCn":"双脚叠放或前后错开。髋部抬起——不要让它下沉。右侧先做。收紧腹斜肌和臀中肌。"},"bulgarian-split-squat":{"name":"Bulgarian Split Squat","nameCn":"保加利亚分腿蹲","video":"https://www.youtube.com/watch?v=2C-uNgKwPLE","cue":"Right side first. Rear foot on bench. Torso slightly forward to bias glute. Front knee tracks over toes. Drive through front heel. This is the primary asymmetry corrector.","category":"lunge","cueCn":"右侧先做。后脚放在长凳上。躯干略微前倾以侧重臀肌。前膝对准脚尖方向。通过前脚跟发力。这是纠正不对称的主要动作。"},"goblet-squat":{"name":"Goblet Squat","nameCn":"高脚杯深蹲","video":"https://www.youtube.com/watch?v=MeIiIdhvXT4","cue":"DB held at chest. Sit between hips. Full depth — below parallel if mobility allows. Heels down, chest up.","category":"squat","cueCn":"哑铃托在胸前。坐到两髋之间。全深度——如果灵活性允许，蹲到平行以下。脚跟不离地，胸部挺起。"},"single-leg-hip-thrust":{"name":"Single-Leg Hip Thrust","nameCn":"单腿臀推","video":"https://www.youtube.com/watch?v=GoqoWSAiOsA","cue":"Right side first. Shoulder blades on bench. Working leg drives through heel. Non-working leg held at 90° hip/knee. Full lockout + glute squeeze.","category":"glute","cueCn":"右侧先做。肩胛骨靠在长凳上。工作腿通过脚跟发力。非工作腿保持髋/膝90°。完全锁定并挤压臀肌。"},"walking-lunge":{"name":"Walking Lunge (DBs)","nameCn":"哑铃行走弓步","video":"https://www.youtube.com/watch?v=_DLIS8SySzs","cue":"Long stride to bias glutes. Upright torso. Control the eccentric — don't crash into the lunge.","category":"lunge","cueCn":"大步幅以侧重臀肌。躯干保持直立。控制离心阶段——不要砸入弓步。"},"banded-seated-hip-abduction":{"name":"Banded Seated Hip Abduction","nameCn":"弹力带坐姿髋外展","video":"https://www.youtube.com/watch?v=uo4_wM5r7zY","cue":"Sit on bench edge. Band above knees. Push knees out against band. Squeeze glute med at end range. High-rep pump.","category":"glute","cueCn":"坐在长凳边缘。弹力带放在膝盖上方。向外推膝盖对抗弹力带。在末端挤压臀中肌。高次数泵感训练。"},"pallof-press-rotation":{"name":"Pallof Press with Rotation","nameCn":"帕洛夫推加旋转","video":"https://www.youtube.com/watch?v=Y0e2w0aKOXw","cue":"Press out, then rotate away from anchor. Resist the pull back. Anti-rotation under rotation demand.","category":"core","cueCn":"向前推出，然后向远离锚点方向旋转。抵抗拉力回弹。在旋转需求下的抗旋转训练。"},"bird-dog":{"name":"Bird Dog","nameCn":"鸟狗式","video":"https://www.youtube.com/watch?v=wGh2fZU20-M","cue":"Opposite arm + leg extend. Hold top 2s. Don't rotate hips. Right side first. Keep spine neutral.","category":"core","cueCn":"对侧手臂和腿伸展。在顶部保持2秒。不要旋转髋部。右侧先做。保持脊柱中立。"},"db-bench-press":{"name":"DB Bench Press","nameCn":"哑铃卧推","video":"https://www.youtube.com/watch?v=pKZMNVbfUzQ","cue":"Feet flat. Slight arch. Lower to chest, press up. Elbows ~45° — not flared.","category":"push","cueCn":"双脚平放。轻微弓背。下放至胸部，向上推。肘部约45°——不要外展。"},"db-overhead-press":{"name":"DB Overhead Press","nameCn":"哑铃肩推","video":"https://www.youtube.com/watch?v=s_aK83TWYkA","cue":"Press from shoulders to overhead. Don't overarch lower back. Brace core throughout.","category":"push","cueCn":"从肩部推至头顶。不要过度弓腰。全程收紧核心。"},"db-lateral-raise":{"name":"DB Lateral Raise","nameCn":"哑铃侧平举","video":"https://www.youtube.com/watch?v=3VcKaXpzqRo","cue":"Slight bend in elbows. Raise to shoulder height. Control the lower. Light weight — quality over load.","category":"push","cueCn":"肘部微屈。举到肩膀高度。控制下放。轻重量——质量优于负荷。"},"ab-wheel-rollout":{"name":"Ab Wheel Rollout","nameCn":"健腹轮","video":"https://www.youtube.com/watch?v=9ZCoAbI7uX0","cue":"Brace HARD. Posterior pelvic tilt maintained — do not let lower back extend. Roll out only as far as form holds. Builds trunk stability for deadlift.","category":"core","cueCn":"用力收紧核心。保持骨盆后倾——不要让下背部伸展。只滚到能保持姿势的距离。为硬拉建立躯干稳定性。"},"frog-pump":{"name":"Frog Pump","nameCn":"蛙式臀桥","video":"https://www.youtube.com/watch?v=HyCiZVMMDW4","cue":"Soles together, knees out. Drive hips up. Pure glute isolation. High-rep pump exercise.","category":"glute","cueCn":"脚掌相对，膝盖向外。向上推髋部。纯臀肌孤立训练。高次数泵感训练。"},"conventional-deadlift":{"name":"Conventional Deadlift","nameCn":"传统硬拉","video":"https://www.youtube.com/watch?v=yo2RV3G8gLw","cue":"Feet hip-width, orthotics on. Brace hard before every rep. Push floor away — don't pull the bar up. Bar over mid-foot. Lockout with glutes, not lower back hyperextension.","category":"hinge","cueCn":"双脚与髋同宽，穿矫形鞋垫。每次动作前用力收紧核心。推地板——不是拉杠铃。杠铃在脚掌中部上方。用臀肌锁定，不要过度伸展下背部。"},"pause-deadlift":{"name":"Pause Deadlift (2s at Knee)","nameCn":"暂停硬拉（膝盖处停顿2秒）","video":"https://www.youtube.com/watch?v=cjT5Fx4qv-4","cue":"Pull to knee, HOLD 2s — maintain flat back and braced core. Then complete the pull. Builds positional stability under load.","category":"hinge","cueCn":"拉到膝盖高度，保持2秒——维持平背和核心收紧。然后完成拉起。在负重下建立位置稳定性。"},"farmers-carry":{"name":"Farmer's Carry","nameCn":"农夫行走","video":"https://www.youtube.com/watch?v=Fkzk_RqlYig","cue":"Heavy DBs by sides. Brace. Shoulders packed down. Don't lean. Walk with control. Builds trunk stability that transfers to deadlift.","category":"core","cueCn":"双手持重哑铃放在身体两侧。收紧核心。肩膀下沉收紧。不要倾斜。有控制地行走。建立对硬拉有帮助的躯干稳定性。"},"suitcase-carry":{"name":"Suitcase Carry","nameCn":"手提箱行走","video":"https://www.youtube.com/watch?v=T9A607GaR2w","cue":"Single DB in one hand. Don't lean toward the weight. Brace hard — anti-lateral flexion. Right hand first.","category":"core","cueCn":"单手持哑铃。不要向重量方向倾斜。用力收紧——抗侧屈。右手先做。"},"side-plank-hip-dip":{"name":"Side Plank with Hip Dip","nameCn":"侧平板支撑加髋下沉","video":"https://www.youtube.com/watch?v=BWQRVB4LyFI","cue":"Drop hip toward floor, drive back up. Right side first. Targets obliques + glute med.","category":"core","cueCn":"髋部向地面下沉，再推回上方。右侧先做。针对腹斜肌和臀中肌。"},"band-pull-through":{"name":"Band Pull-Through","nameCn":"弹力带拉穿","video":"https://www.youtube.com/watch?v=RZ4HyxZBAdQ","cue":"Anchor band low on stall bar. Face away. Hip hinge, squeeze glutes at top. Reinforces hinge pattern with glute focus.","category":"glute","cueCn":"将弹力带低位固定在肋木上。背对锚点。髋铰链，在顶部挤压臀肌。用臀肌发力强化铰链模式。"},"deficit-deadlift":{"name":"Deficit Deadlift","nameCn":"垫高硬拉","video":"https://www.youtube.com/watch?v=hnuPZZfeRzs","cue":"Stand on 5 cm plate. Increased range of motion off the floor builds pull strength. Maintain flat back — if it rounds, reduce deficit or load.","category":"hinge","cueCn":"站在5厘米杠铃片上。增加离地范围以建立拉力。保持平背——如果弯曲，减少垫高或负重。"},"chinup-progression":{"name":"Chin-Up Progression","nameCn":"引体向上进阶","video":"https://www.youtube.com/watch?v=e1YSApl-QcM","cue":"Supinated (underhand) grip. Progression: negative chin-ups (5s lower) → band-assisted → full chin-ups. Initiate with scapular depression, then pull.","category":"pull","cueCn":"反握（掌心朝自己）。进阶：离心引体（5秒下放）→弹力带辅助→完整引体向上。先肩胛骨下沉，再拉。"},"sumo-deadlift":{"name":"Sumo Deadlift","nameCn":"相扑硬拉","video":"https://www.youtube.com/watch?v=cDlOSfu-zHY","cue":"Wide stance, toes out 30–45°. Sit INTO the bar — hips closer to bar than conventional. Lockout by squeezing glutes forward. Wider stance = more glute + adductor recruitment.","category":"hinge","cueCn":"宽站距，脚尖外转30-45°。坐入杠铃——髋部比传统硬拉更靠近杠铃。通过向前挤压臀肌锁定。宽站距=更多臀肌和内收肌参与。"},"barbell-reverse-lunge":{"name":"Reverse Lunge (Barbell)","nameCn":"杠铃反向弓步","video":"https://www.youtube.com/watch?v=H31sX4Bkbj4","cue":"Step BACK — more glute-friendly than forward lunge. Barbell on back. Right side first. Control the step back.","category":"lunge","cueCn":"向后迈步——比前弓步更有利于臀肌发力。杠铃在背上。右侧先做。控制向后迈步。"},"db-tricep-overhead-ext":{"name":"DB Tricep Overhead Extension","nameCn":"哑铃过头臂屈伸","video":"https://www.youtube.com/watch?v=v1qDINLCb8Q","cue":"Single DB held with both hands overhead. Lower behind head, extend up. Targets long head of tricep — arm shape + lockout strength.","category":"push","cueCn":"双手握住单个哑铃举过头顶。向头后下放，再伸展上推。针对肱三头肌长头——手臂线条和锁定力量。"},"hanging-knee-raise":{"name":"Hanging Knee Raise","nameCn":"悬垂屈膝举腿","video":"https://www.youtube.com/watch?v=G6a5267YpHM","cue":"Hang from bar or rings. Raise knees to chest — don't swing. Brace. Anterior core under hip flexion.","category":"core","cueCn":"悬挂在杠或吊环上。将膝盖抬至胸部——不要摆动。收紧核心。髋屈下的前侧核心训练。"},"db-hammer-curl":{"name":"DB Hammer Curl","nameCn":"哑铃锤式弯举","video":"https://www.youtube.com/watch?v=zC3nLlEvin4","cue":"Neutral grip — targets brachioradialis + bicep. Strict form, no swing.","category":"pull","cueCn":"中立握法——针对肱桡肌和肱二头肌。严格姿势，不要摆动。"},"barbell-back-squat":{"name":"Barbell Back Squat","nameCn":"杠铃深蹲","video":"https://www.youtube.com/watch?v=bEv6CCg2BC8","cue":"Low bar position biases posterior chain and glutes. Sit back and down. Below parallel if mobility allows. Brace hard. Orthotics on.","category":"squat","cueCn":"低杠位偏向后链和臀肌。向后向下坐。如果灵活性允许，蹲到平行以下。用力收紧核心。穿矫形鞋垫。"},"90-90-hip-stretch":{"name":"90/90 Hip Stretch","nameCn":"90/90髋关节拉伸","video":"https://www.youtube.com/watch?v=t4Zz6-aG8Iw","cue":"Both legs at 90° angles. Lean forward over front shin for glute stretch. Hold and breathe.","category":"flexibility","cueCn":"双腿呈90°角。向前侧小腿方向前倾以拉伸臀肌。保持并呼吸。"},"pigeon-stretch":{"name":"Pigeon Stretch","nameCn":"鸽子式拉伸","video":"https://www.youtube.com/watch?v=46phRH_09yM","cue":"Front shin across body, back leg extended. Lean forward to deepen stretch in front hip external rotators.","category":"flexibility","cueCn":"前侧小腿横放在身前，后腿伸直。前倾加深前侧髋关节外旋肌群的拉伸。"},"hamstring-stretch":{"name":"Standing Hamstring Stretch","nameCn":"站立腘绳肌拉伸","video":"https://www.youtube.com/watch?v=LVY692zJK0A","cue":"Foot on bench. Keep leg straight. Hinge forward at hip. Feel stretch in back of thigh.","category":"flexibility","cueCn":"脚放在长凳上。保持腿伸直。在髋关节处前倾。感受大腿后侧拉伸。"},"hip-flexor-stretch":{"name":"Hip Flexor Stretch (Half-Kneeling)","nameCn":"半跪髋屈肌拉伸","vide
