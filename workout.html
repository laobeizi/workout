/www.youtube.com/watch?v=J9-7QXCsPL0","cue":"Toe pull: press fingertips harder to peel toes off wall — hold 2–4s. Heel pull: shift weight to fingertips to lift heels — hold 2–4s. Each attempt is separate.","category":"skill"},"kickup-pirouette":{"name":"Kick-Up + Pirouette Bail","video":"https://www.youtube.com/watch?v=ZzEP7XvkDDk","cue":"Kick up into freestanding HS. To bail safely: pirouette sideways — rotate body and step one foot down. Practice the bail separately first.","category":"skill"},"diaphragmatic-breathing":{"name":"Diaphragmatic Breathing","video":"https://www.youtube.com/watch?v=9jpchJcKivk","cue":"Hands on belly. Belly rises on inhale — not chest. In through nose 4s, pause, out through mouth 6s. Feel 360° rib cage expansion.","category":"spinal-stabilisation"},"mcgill-bird-dog":{"name":"McGill Bird Dog","video":"https://www.youtube.com/watch?v=S1QbyYZaXIg","cue":"Brace core FIRST. Extend opposite arm + leg simultaneously. Back FLAT — zero rotation, zero sag. 3s hold at full extension. Return slowly.","category":"spinal-stabilisation"},"dead-bug":{"name":"Dead Bug","video":"https://www.youtube.com/watch?v=bxn9FBrt4-A","cue":"Press lower back INTO floor throughout — never let it lift. Opposite arm + leg extend slowly. Exhale on extension.","category":"spinal-stabilisation"},"glute-bridge":{"name":"Glute Bridge","video":"https://www.youtube.com/watch?v=Q_Bpj91Yiis","cue":"Drive through HEELS. Maximum glute squeeze at top. Posteriorly tilt pelvis — no lower back hyperextension. 2s pause.","category":"spinal-stabilisation"},"single-leg-glute-bridge":{"name":"Single-Leg Glute Bridge","video":"https://www.youtube.com/watch?v=wQQ6N5piDG0","cue":"Drive through single heel. Full glute squeeze at top. Non-working leg raised. Keep hips level — no rotation. 2s pause.","category":"spinal-stabilisation"},"side-plank-knee":{"name":"Side Plank (knee down)","video":"https://www.youtube.com/watch?v=ribtncUfriU","cue":"Bottom knee bent. Hip fully lifted. Straight line from head to top knee. No sagging.","category":"spinal-stabilisation"},"hip-flexor-90-90":{"name":"90/90 Hip Flexor Stretch","video":"https://www.youtube.com/watch?v=VYvMMw8z3rE","cue":"Front shin parallel to mat, back knee on floor. Tall spine. Gently drive front hip crease toward floor. Breathe. <span class=\\"ex-warn\\">If back-hip IR is tight: sit on firm cushion (5–8 cm) to reduce demand. Progress to floor.</span>","category":"mobility"},"pigeon-pose":{"name":"Pigeon Pose","video":"https://www.youtube.com/watch?v=WWJAlAM_Lyw","cue":"Front shin forward, hips square. Fold forward if comfortable. Breathe into outer hip stretch.","category":"mobility"},"scap-pullup":{"name":"Scap Pull-Up / Active Hang Shrug","video":"https://www.youtube.com/watch?v=-ZIpSoTRsuE","cue":"Start in dead hang. ONLY movement: shrug shoulders DOWN and BACK (not up). 3s hold — feel lats activate. Return to full dead hang.","category":"pull"},"c2b-pullup":{"name":"Chest-to-Bar Pull-Up","video":"https://www.youtube.com/watch?v=uBJFngf1ge0","cue":"Initiate with scap pull. Drive elbows back and DOWN. Pull chest INTO bar — not chin. No kipping. Full dead hang each rep.","category":"pull"},"c2b-negative":{"name":"Feet-Assisted C2B Negative","video":"https://www.youtube.com/watch?v=SmduaQzt8Jk","cue":"Use feet to reach chest-to-bar position. Lower SLOWLY over 5s minimum. Lats and bicep focus. Full dead hang at bottom.","category":"pull"},"false-grip-pullup":{"name":"False Grip Pull-Up","video":"https://www.youtube.com/watch?v=TIMMk2mEPeE","cue":"Hook wrists OVER bar/ring. Maintain false grip throughout. Builds muscle-up transition.","category":"pull"},"pike-pushup":{"name":"Pike Push-Up","video":"https://www.youtube.com/watch?v=DG-NcMnfZ_0","cue":"Hips high (inverted V). Lower head between hands. Full range — crown toward floor. Build progressively — add 1 rep/session when form is clean.","category":"push"},"elevated-pike-pushup":{"name":"Elevated Pike Push-Up","video":"https://www.youtube.com/watch?v=8URA3YSur2M","cue":"Feet on stable surface. Hips high. Full HSPU movement pattern. Head between hands at bottom.","category":"push"},"ring-dip":{"name":"Ring Dip","video":"https://www.youtube.com/watch?v=iZAVN-UQ5Zc","cue":"Full lockout at top — rings turned out. Controlled descent, elbows track back.","category":"push"},"landmine-press":{"name":"Landmine Press","video":"https://www.youtube.com/watch?v=3gYz0bLG-wY","cue":"Press at 45° arc. Full elbow extension. Opposite foot forward for stability.","category":"push"},"prone-y-raise":{"name":"Prone Floor Y-Raise","video":"https://www.youtube.com/watch?v=w1AWGKubE5U","cue":"Face down. Thumbs up. Raise arms in Y position. Squeeze shoulder blades. Feel lower traps work.","category":"shoulder-maintenance"},"lateral-raise":{"name":"Lateral Raise (neutral grip)","video":"https://www.youtube.com/watch?v=Y29xKcze8Ik","cue":"Slight forward lean. Raise to shoulder height. Slow 3s descent — feel lateral deltoid.","category":"shoulder-maintenance"},"face-pulls":{"name":"Face Pulls (band/cable)","video":"https://www.youtube.com/watch?v=g9sehH0vp9U","cue":"Pull to face level. Elbows HIGH. External rotation at end. Squeeze rear delts. No shrug.","category":"shoulder-maintenance"},"back-extension":{"name":"Back Extension","video":"https://www.youtube.com/watch?v=WJm88qItjeE","cue":"Hips on pad. Neutral spine — no hyperextension at top. FEEL glutes fire.","category":"posterior-chain"},"du-tu":{"name":"Double Under / Triple Under","video":"https://www.youtube.com/watch?v=ej7J0OKvTHQ","cue":"Warm up with DU. Attempt TU — focus on triple wrist rotation speed. If TU fails, back to DU immediately. Keep moving. Goal: timing and wrist mechanics.","category":"skill"},"jump-rope-reintro":{"name":"Jump Rope Progression","video":"https://www.youtube.com/watch?v=ej7J0OKvTHQ","cue":"Session 1 Phase 2: singles only × 3 min — monitor left QL 24–48h after. | If pain-free: DU × 5 min next session. | If DU pain-free × 2 sessions: attempt TU. | Once DU established: resume standard 8 min DU/TU finisher.","category":"skill"},"goblet-squat":{"name":"Goblet Squat","video":"https://www.youtube.com/watch?v=yGswPtbSlro","cue":"Dumbbell at chest. Squat deep. Knees track over toes. Chest UP at bottom. Drive through heels.","category":"squat"},"single-leg-rdl":{"name":"Single-Leg RDL","video":"https://www.youtube.com/watch?v=Zfr6wizR8rs","cue":"Soft knee on standing leg. Hinge at hip — NOT lower back. Feel hamstring load. Pause at bottom.","category":"hinge"},"step-up":{"name":"Step-Up","video":"https://www.youtube.com/watch?v=vOiHvzj5XhA","cue":"Full foot on box. Drive through heel. Stand fully. Controlled descent. No push-off from back foot.","category":"lunge"},"ab-wheel-knees":{"name":"Ab Wheel (from knees)","video":"https://www.youtube.com/watch?v=9ZCoAbI7uX0","cue":"From knees. Brace core completely before rolling. Roll out as far as you maintain hollow position. Pull back through lats.","category":"core"},"ab-wheel-standing":{"name":"Ab Wheel (from standing)","video":"https://www.youtube.com/watch?v=CxS10wcWq2s","cue":"Full standing rollout. Brace core completely. Roll to near-horizontal. Pull back through lats. No hyperextension at bottom.","category":"core"},"toe-walking":{"name":"Toe Walking","video":"https://www.youtube.com/watch?v=9_9Od8Lf5Lc","cue":"Walk on tip-toes continuously. Strengthens tibialis anterior. Maintain balance.","category":"lower-body"},"single-leg-squat":{"name":"Single-Leg Squat","video":"https://www.youtube.com/watch?v=vq5-vdgJc0I","cue":"Hold stall bar lightly. One-leg squat. Knee tracks over toes. Progress to reducing hand support.","category":"squat"},"bulgarian-split-squat":{"name":"Bulgarian Split Squat","video":"https://www.youtube.com/watch?v=hiLF_pF3EJM","cue":"Back foot elevated. Front foot forward enough for vertical shin. Control descent throughout.","category":"lunge"},"controlled-landing-drill":{"name":"Controlled Landing Drill","video":"https://www.youtube.com/watch?v=rqN
