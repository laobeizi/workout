Practice the bail separately first.","category":"skill"},"diaphragmatic-breathing":{"name":"Diaphragmatic Breathing","video":"https://www.youtube.com/watch?v=9jpchJcKivk","cue":"Hands on belly. Belly rises on inhale — not chest. In through nose 4s, pause, out through mouth 6s. Feel 360° rib cage expansion.","category":"spinal-stabilisation"},"mcgill-bird-dog":{"name":"McGill Bird Dog","video":"https://www.youtube.com/watch?v=S1QbyYZaXIg","cue":"Brace core FIRST. Extend opposite arm + leg simultaneously. Back FLAT — zero rotation, zero sag. 3s hold at full extension. Return slowly.","category":"spinal-stabilisation"},"dead-bug":{"name":"Dead Bug","video":"https://www.youtube.com/watch?v=bxn9FBrt4-A","cue":"Press lower back INTO floor throughout — never let it lift. Opposite arm + leg extend slowly. Exhale on extension.","category":"spinal-stabilisation"},"glute-bridge":{"name":"Glute Bridge","video":"https://www.youtube.com/watch?v=Q_Bpj91Yiis","cue":"Drive through HEELS. Maximum glute squeeze at top. Posteriorly tilt pelvis — no lower back hyperextension. 2s pause.","category":"spinal-stabilisation"},"single-leg-glute-bridge":{"name":"Single-Leg Glute Bridge","video":"https://www.youtube.com/watch?v=wQQ6N5piDG0","cue":"Drive through single heel. Full glute squeeze at top. Non-working leg raised. Keep hips level — no rotation. 2s pause.","category":"spinal-stabilisation"},"side-plank-knee":{"name":"Side Plank (knee down)","video":"https://www.youtube.com/watch?v=ribtncUfriU","cue":"Bottom knee bent. Hip fully lifted. Straight line from head to top knee. No sagging.","category":"spinal-stabilisation"},"hip-flexor-90-90":{"name":"90/90 Hip Flexor Stretch","video":"https://www.youtube.com/watch?v=VYvMMw8z3rE","cue":"Front shin parallel to mat, back knee on floor. Tall spine. Gently drive front hip crease toward floor. Breathe. <span class=\\"ex-warn\\">If back-hip IR is tight: sit on firm cushion (5–8 cm) to reduce demand. Progress to floor.</span>","category":"mobility"},"pigeon-pose":{"name":"Pigeon Pose","video":"https://www.youtube.com/watch?v=WWJAlAM_Lyw","cue":"Front shin forward, hips square. Fold forward if comfortable. Breathe into outer hip stretch.","category":"mobility"},"scap-pullup":{"name":"Scap Pull-Up / Active Hang Shrug","video":"https://www.youtube.com/watch?v=-ZIpSoTRsuE","cue":"Start in dead hang. ONLY movement: shrug shoulders DOWN and BACK (not up). 3s hold — feel lats activate. Return to full dead hang.","category":"pull"},"c2b-pullup":{"name":"Chest-to-Bar Pull-Up","video":"https://www.youtube.com/watch?v=uBJFngf1ge0","cue":"Initiate with scap pull. Drive elbows back and DOWN. Pull chest INTO bar — not chin. No kipping. Full dead hang each rep.","category":"pull"},"c2b-negative":{"name":"Feet-Assisted C2B Negative","video":"https://www.youtube.com/watch?v=SmduaQzt8Jk","cue":"Use feet to reach chest-to-bar position. Lower SLOWLY over 5s minimum. Lats and bicep focus. Full dead hang at bottom.","category":"pull"},"false-grip-pullup":{"name":"False Grip Pull-Up","video":"https://www.youtube.com/watch?v=TIMMk2mEPeE","cue":"Hook wrists OVER bar/ring. Maintain false grip throughout. Builds muscle-up transition.","category":"pull"},"pike-pushup":{"name":"Pike Push-Up","video":"https://www.youtube.com/watch?v=DG-NcMnfZ_0","cue":"Hips high (inverted V). Lower head between hands. Full range — crown toward floor. Build progressively — add 1 rep/session when form is clean.","category":"push"},"elevated-pike-pushup":{"name":"Elevated Pike Push-Up","video":"https://www.youtube.com/watch?v=8URA3YSur2M","cue":"Feet on stable surface. Hips high. Full HSPU movement pattern. Head between hands at bottom.","category":"push"},"ring-dip":{"name":"Ring Dip","video":"https://www.youtube.com/watch?v=iZAVN-UQ5Zc","cue":"Full lockout at top — rings turned out. Controlled descent, elbows track back.","category":"push"},"landmine-press":{"name":"Landmine Press","video":"https://www.youtube.com/watch?v=3gYz0bLG-wY","cue":"Press at 45° arc. Full elbow extension. Opposite foot forward for stability.","category":"push"},"prone-y-raise":{"name":"Prone Floor Y-Raise","video":"https://www.youtube.com/watch?v=w1AWGKubE5U","cue":"Face down. Thumbs up. Raise arms in Y position. Squeeze shoulder blades. Feel lower traps work.","category":"shoulder-maintenance"},"lateral-raise":{"name":"Lateral Raise (neutral grip)","video":"https://www.youtube.com/watch?v=Y29xKcze8Ik","cue":"Slight forward lean. Raise to shoulder height. Slow 3s descent — feel lateral deltoid.","category":"shoulder-maintenance"},"face-pulls":{"name":"Face Pulls (band/cable)","video":"https://www.youtube.com/watch?v=g9sehH0vp9U","cue":"Pull to face level. Elbows HIGH. External rotation at end. Squeeze rear delts. No shrug.","category":"shoulder-maintenance"},"back-extension":{"name":"Back Extension","video":"https://www.youtube.com/watch?v=WJm88qItjeE","cue":"Hips on pad. Neutral spine — no hyperextension at top. FEEL glutes fire.","category":"posterior-chain"},"du-tu":{"name":"Double Under / Triple Under","video":"https://www.youtube.com/watch?v=ej7J0OKvTHQ","cue":"Warm up with DU. Attempt TU — focus on triple wrist rotation speed. If TU fails, back to DU immediately. Keep moving. Goal: timing and wrist mechanics.","category":"skill"},"jump-rope-reintro":{"name":"Jump Rope Progression","video":"https://www.youtube.com/watch?v=ej7J0OKvTHQ","cue":"Session 1 Phase 2: singles only × 3 min — monitor left QL 24–48h after. | If pain-free: DU × 5 min next session. | If DU pain-free × 2 sessions: attempt TU. | Once DU established: resume standard 8 min DU/TU finisher.","category":"skill"},"tu-troubleshoot":{"name":"TU Troubleshooting Protocol","video":"https://www.youtube.com/watch?v=ej7J0OKvTHQ","cue":"<strong>ROPE CHECK:</strong> Stand on centre with 1 foot. Handles should reach between lower sternum and nipple line. Longer = too slow for TU.<br><br><strong>Part 1 — Wrist Spin Drill (2 min, 1 min each side):</strong><br>Hold 1 handle. Spin rope at your side like a lasso. WRIST ONLY — lock elbow to ribs. Do triple-speed bursts for 5–10s, rest, repeat. If your forearm or elbow starts moving, that's the compensation pattern — reset and isolate the wrist.<br><br><strong>Part 2 — DU→TU Transitions (6 min):</strong><br>Stage 1: 3 DU → 1 TU → 3 DU → 1 TU. Build wrist speed burst off the DU rhythm.<br>Stage 2 (when landing TU 8/10 times): 2 DU → 1 TU → 2 DU → 1 TU.<br>Stage 3 (when Stage 2 is consistent): attempt 2 consecutive TU.<br><br><strong>Diagnostic — Penguin Taps (no rope):</strong> Jump to TU height, slap thighs 3× before landing. If you can't get 3 taps → need more jump height. If 3 taps easy → jump height is fine, it's purely wrist speed.<br><br><em>Temporary protocol — 2–3 weeks. Reassess at next check-in.</em>","category":"skill"},"goblet-squat":{"name":"Goblet Squat","video":"https://www.youtube.com/watch?v=yGswPtbSlro","cue":"Dumbbell at chest. Squat deep. Knees track over toes. Chest UP at bottom. Drive through heels.","category":"squat"},"single-leg-rdl":{"name":"Single-Leg RDL","video":"https://www.youtube.com/watch?v=Zfr6wizR8rs","cue":"Soft knee on standing leg. Hinge at hip — NOT lower back. Feel hamstring load. Pause at bottom.","category":"hinge"},"step-up":{"name":"Step-Up","video":"https://www.youtube.com/watch?v=vOiHvzj5XhA","cue":"Full foot on box. Drive through heel. Stand fully. Controlled descent. No push-off from back foot.","category":"lunge"},"ab-wheel-knees":{"name":"Ab Wheel (from knees)","video":"https://www.youtube.com/watch?v=9ZCoAbI7uX0","cue":"From knees. Brace core completely before rolling. Roll out as far as you maintain hollow position. Pull back through lats.","category":"core"},"ab-wheel-standing":{"name":"Ab Wheel (from standing)","video":"https://www.youtube.com/watch?v=CxS10wcWq2s","cue":"Full standing rollout. Brace core completely. Roll to near-horizontal. Pull back through lats. No hyperextension at bottom.","category":"core"},"toe-walking":{"name":"Toe Walking","video":"https://www.youtube.com/watch?v=9_9Od8Lf5Lc","cue":"Walk on tip-toes continuously. Strengthens tibialis anterior. Maintain balance.","category":"lower-body"},"single-leg-squat":{"name":"Single-Leg Squat","video":"https://www.youtube.com/watch?v=vq5-vdgJc0I","cue":"Hold stall bar lightly. One-leg squat. Knee tracks over toes. Progress to reducing hand support.","category":"squat"},"bulgarian-split-squat":{"name":"Bulgarian Split Squat","video":"https://www.youtube.com/watch?v=hiLF_pF3EJM","cue":"Back foot elevated. Front foot forward enough for vertical shin. Control descent throughout.","category":"lunge"},"controlled-landing-drill":{"name":"Controlled Landing Drill","video":"https://www.youtube.com/watch?v=rqNJdtrNyqQ","cue":"Step (not jump) off box. Absorb: ankle → knee → hip simultaneously. Soft knees. No valgus. <span class=\\"ex-warn\\">AIM FOR SILENCE.</span> Full reset each rep.","category":"plyometric-prep"},"toes-to-bar":{"name":"Toes-to-Bar","video":"https://www.youtube.com/watch?v=DVMrILiX_oc","cue":"Dead hang. Drive knees up first, then kick toes to bar. Controlled return.","category":"core"},"dragon-flag":{"name":"Dragon Flag","video":"https://www.youtube.com/watch?v=1kLc8noY2Ag","cue":"Anchor shoulders on bench or stall bar. Body straight, lower legs-first. Full control. Start tucked — progress to straight when ready.","category":"core"},"weighted-pullup":{"name":"Weighted Pull-Up","video":"https://www.youtube.com/watch?v=9hRVxRUlkkI","cue":"Dip belt or dumbbell between legs. Full dead hang each rep. Scap pull → drive elbows down → full chin over bar. Controlled 2s descent.","category":"pull"},"explosive-high-pull":{"name":"Explosive High Pull","video":"https://www.youtube.com/watch?v=DpAoHo3T3f0","cue":"Pull as FAST and HIGH as possible. Intent: bar to lower sternum or belly button. Don't aim for chest contact — aim for maximum upward velocity. <span class=\\"ex-warn\\">Cue: fast elbows, not high chest.</span>","category":"pull"},"eccentric-mu-negative":{"name":"Eccentric Muscle-Up Negative","video":"https://www.youtube.com/watch?v=WKf1PfMqfmU","cue":"Jump or foot-assist to dip support above bar. Lower SLOWLY through the transition (5s minimum). Control the turnover — wrists rotate from push to pull grip. Finish in dead hang. <span class=\\"ex-warn\\">Stop if elbow pain at medial epicondyle.</span>","category":"pull"},"barbell-back-squat":{"name":"Barbell Back Squat","video":"https://www.youtube.com/watch?v=8PMjqgR8Wa8","cue":"<span class=\\"ex-warn\\">RETURN PROTOCOL:</span> Wk5 empty bar × 10 · Wk6 50% working weight · Wk7+ working weight. Brace before descent. Bar over mid-foot. Chest UP — do not fold. Drive knees out. Reduce depth if lower back rounds.","category":"squat"},"barbell-rdl-nordic":{"name":"Barbell RDL / Nordic Curl","video":"https://www.youtube.com/watch?v=uhghy9pFIPY","cue":"<span class=\\"ex-warn\\">RETURN PROTOCOL:</span> RDL: Wk5 40–50%. Bar close to legs. Hinge at hip. | Nordic: Wk5 lower to 45° only. Controlled descent — use hands to stand. Video link is for RDL; Nordic tutorial: youtube.com/watch?v=_e9vFU9-tkc","category":"hinge"},"box-jump":{"name":"Box Jump","video":"https://www.youtube.com/watch?v=G-bxQY57mKc","cue":"<span class=\\"ex-warn\\">RETURN PROTOCOL:</span> Wk5 40 cm × soft landing × 3×5. Wk6 working height × 5. Wk7+ 4×5. Land SOFT: ankle → knee → hip. SILENT. No valgus. Full stand and reset between reps.","category":"explosive"},"hip-thrust":{"name":"Hip Thrust","video":"https://www.youtube.com/watch?v=pF17m_CXfL0","cue":"<span class=\\"ex-warn\\">RETURN PROTOCOL:</span> Wk5 bodyweight only — establish technique. Wk6+ add dumbbell on hips, progress to barbell. SETUP: upper back against power rack crossbar (or low box if available). Feet flat, hip-width. Drive through heels — hips to full extension. Squeeze glutes hard at top. Chin tucked. No hyperextension in lower back.","category":"hinge"},"standing-pike":{"name":"Standing Pike","video":"https://www.youtube.com/watch?v=ghuaqD8rHvY","cue":"Stand tall. Hinge forward at hips. Reach toward floor. Neck relaxed. Feel hamstrings lengthen.","category":"flexibility"},"low-lunge-foot-bind":{"name":"Low Lunge with Foot Bind","video":"https://www.youtube.com/watch?v=7D3eyJpUj_o","cue":"Deep lunge. Front foot flat. Reach back and grab back foot if able. Hip flexor + quad stretch.","category":"flexibility"},"calf-stretch":{"name":"Calf Stretch","video":"https://www.youtube.com/watch?v=27hP-Y0ED_8","cue":"Heel to ground. Straight leg = gastrocnemius. Slightly bent = soleus. Hold both positions.","category":"flexibility"},"supine-hamstring-stretch":{"name":"Supine Hamstring Stretch","video":"https://www.youtube.com/watch?v=Il1L75v6gq0","cue":"Lie on back. One leg raised (strap or hands). Keep lower back flat on floor. Other leg straight.","category":"flexibility"},"prone-hip-ir":{"name":"Prone Hip Internal Rotation Stretch","video":"https://www.youtube.com/watch?v=df7PseMMYrg","cue":"Face down, knee bent 90°. Let foot fall outward (hip internal rotation). Keep pelvis flat — no lifting or rotating. Feel stretch in outer hip/glute. NOT groin pinch.","category":"mobility"},"90-90-ir-liftoff":{"name":"90/90 IR Lift-Off","video":"https://www.youtube.com/watch?v=xUgcAZJ_PDE","cue":"Sit in 90/90 position. Back leg: actively lift the KNEE off the floor using hip internal rotation ONLY. Keep foot planted. Pelvis stays level — no leaning away. Progress: hold 3s → hold 5s → lift + slow tiny circles.","category":"mobility"},"half-kneeling-adductor-rockback":{"name":"Half-Kneeling Adductor Rockback","video":"https://www.youtube.com/watch?v=m1WtnazGzbg","cue":"Trailing knee down, extended leg straight to the side. Rock hips toward straight leg. Keep spine neutral — no rounding to reach. Feel adductor lengthen.","category":"mobility"},"straddle-contract-relax":{"name":"Straddle Contract-Relax (PNF)","video":"https://www.youtube.com/watch?v=O9jtFCH58nE","cue":"Seated wide straddle. Push legs INTO floor hard × 5 counts → relax and tip pelvis forward deeper. Repeat cycle. Anterior pelvic tilt on each relax phase.","category":"flexibility"},"pancake-good-morning":{"name":"Pancake Good Morning","video":"https://www.youtube.com/watch?v=zhpqgzUTMTk","cue":"Seated wide straddle, hands behind head. Hinge forward with FLAT BACK only — stop where spine wants to round. Anterior pelvic tilt throughout. Progress: deeper fold, then add light plate at chest.","category":"flexibility"},"freestanding-hold":{"name":"Freestanding Hold Attempts","video":"https://www.youtube.com/watch?v=ZzEP7XvkDDk","cue":"Kick up and HOLD. Time each attempt. Focus: stack shoulders over wrists, squeeze core, micro-adjust with fingertips. Full rest between attempts. Bail via pirouette when losing it.","category":"skill"},"seated-pancake-hold":{"name":"Seated Pancake Hold","video":"https://www.youtube.com/watch?v=6A1RSnyDDk4","cue":"Seated wide straddle. Fold forward with FLAT BACK as far as possible. Once at end range, relax and breathe — let gravity pull you deeper. Anterior pelvic tilt. No rounding. Accumulate time under stretch.","category":"flexibility"}}`),Bs={"wrist-warmup":{exerciseId:"wrist-warmup",rx:"Follow video sequence"},"butchers-block":{exerciseId:"butchers-block",rx:"2 sets · hold 30–60s"},"side-lat-stretch":{exerciseId:"side-lat-stretch",rx:"2 sets · 30s each side"},"db-external-rotation":{exerciseId:"db-external-rotation",rx:"12–15 reps each side"},"band-shoulder-slide":{exerciseId:"band-shoulder-slide",rx:"12–15 reps"},"face-wall-hold":{exerciseId:"face-wall-hold",rx:"2 × 1 min"},"toe-heel-pulls":{exerciseId:"toe-heel-pulls",rx:"4 × 5 attempts · 2–4s hold each"},"kickup-pirouette":{exerciseId:"kickup-pirouette",rx:"10 attempts"},"diaphragmatic-breathing":{exerciseId:"diaphragmatic-breathing",rx:"1 × 10 deep breaths"},"mcgill-bird-dog-p1":{exerciseId:"mcgill-bird-dog",rx:"3 × 8 each side · 3s hold"},"mcgill-bird-dog-p2":{exerciseId:"mcgill-bird-dog",rx:"2 × 8 each side · 3s hold",cueOverri
